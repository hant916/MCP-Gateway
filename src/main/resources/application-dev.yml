# Development Environment Configuration
spring:
  application:
    name: mcpgateway-spring

  datasource:
    url: jdbc:h2:mem:mcpdb;MODE=PostgreSQL
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    enabled: true

logging:
  level:
    com.mcpgateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

management:
  tracing:
    # Disable tracing export by default in local dev to avoid Zipkin connection warnings.
    # Enable with: TRACING_ENABLED=true (and run Zipkin or set ZIPKIN_ENDPOINT).
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}

mcp:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000} # 1 day
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
  session:
    expiration: ${SESSION_EXPIRATION:3600} # 1 hour
  websocket:
    endpoint: /ws
    topic-prefix: /topic
    application-prefix: /app
  cors:
    # Development: Allow all origins for easier testing
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false

h2:
  console:
    enabled: true
    path: /h2-console
    settings:
      web-allow-others: false

ailuros:
  observability:
    enabled: ${AILUROS_ENABLED:true}
    ingest-url: ${AILUROS_INGEST_URL:http://localhost:8080/api/ailuros/ingest}
    sample-rate: ${AILUROS_SAMPLE_RATE:1.0}
    max-queue: ${AILUROS_MAX_QUEUE:5000}
    emit-timeout-ms: ${AILUROS_EMIT_TIMEOUT_MS:300}
  budget:
    enabled: ${AILUROS_BUDGET_ENABLED:true}
    eval-cron: ${AILUROS_BUDGET_EVAL_CRON:0 */5 * * * *}
    forecast-days: ${AILUROS_BUDGET_FORECAST_DAYS:7}
  webhook:
    enabled: ${AILUROS_WEBHOOK_ENABLED:false}
    url: ${AILUROS_WEBHOOK_URL:}
  regression:
    enabled: ${AILUROS_REGRESSION_ENABLED:true}
    detect-cron: ${AILUROS_RELEASE_DETECT_CRON:0 */10 * * * *}
    max-cases: ${AILUROS_REGRESSION_MAX_CASES:30}
    judge-enabled: ${AILUROS_REGRESSION_JUDGE_ENABLED:false}
    timeout-ms: ${AILUROS_REGRESSION_TIMEOUT_MS:30000}
    detector-window-hours: ${AILUROS_REGRESSION_DETECTOR_WINDOW_HOURS:24}
